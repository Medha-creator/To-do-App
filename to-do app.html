<!DOCTYPE html>
<html lang="en">
<head>
    <title>To-do App</title>
    <link rel="stylesheet" href ="to-do app.css">
</head>
<body>
    <h1 id="main-heading">To-do App</h1>

    <div class="grid-container">
        <input id="input-todo" type="text" placeholder="Enter To-do here">
        <input id="date-todo" type="date">
        <button class="button-todo" onclick="addTodo()">Add</button>
    </div>

    <div class="todo-container grid-container"></div>

    <script src="to-do app.js"></script>
</body>
</html>
